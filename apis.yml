apis:
  - aid: electric-sql:http-sync-api
    name: Electric HTTP Sync API
    description: >-
      The core HTTP API that syncs Shapes of Postgres data to clients. Clients
      issue GET /v1/shape requests with table and offset parameters to receive
      shape log entries as newline-delimited JSON; a live=true flag enables
      long-polling and live_sse=true switches to Server-Sent Events for
      real-time streaming. Authentication is handled via the ELECTRIC_SECRET
      token or a backend proxy pattern.
    humanURL: https://electric.ax/docs/api/http
    baseURL: https://api.electric-sql.cloud
    tags:
      - Sync
      - HTTP API
      - Real-Time
      - Postgres
    properties:
      - type: Documentation
        url: https://electric.ax/docs/api/http
      - type: OpenAPI
        url: openapi/electric-sql-http-sync-api-openapi.yml
  - aid: electric-sql:typescript-client
    name: Electric TypeScript Client
    description: >-
      The official @electric-sql/client NPM package that wraps the HTTP Sync API
      with two high-level primitives: ShapeStream (low-level message stream) and
      Shape (materialized view). Supports SSE, long-polling fallback, custom
      auth headers, PostgreSQL type parsers, and column mapping utilities for
      browser and Node.js environments.
    humanURL: https://electric.ax/docs/api/clients/typescript
    tags:
      - TypeScript
      - SDK
      - Client Library
      - JavaScript
    properties:
      - type: Documentation
        url: https://electric.ax/docs/api/clients/typescript
  - aid: electric-sql:sync-service-config-api
    name: Electric Sync Service Configuration API
    description: >-
      Environment-variable-driven configuration interface for the Electric sync
      service (Elixir/Docker). Controls database connectivity, storage backends,
      concurrent request limits (initial: 300, live: 10 000), shape eviction,
      authentication secrets, and TCP timeouts. Returns 503 when concurrent
      request caps are exceeded.
    humanURL: https://electric.ax/docs/api/config
    tags:
      - Configuration
      - Self-Hosted
      - DevOps
    properties:
      - type: Documentation
        url: https://electric.ax/docs/api/config
