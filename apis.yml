---
aid: electric-sql
name: ElectricSQL
description: >-
  ElectricSQL (Electric) is a local-first sync engine for Postgres that streams
  live database changes to embedded clients in browsers, apps, and AI agents via
  an HTTP-based Shape sync protocol. It exposes a low-level HTTP API and
  TypeScript, Elixir, and other client SDKs that materialize real-time Postgres
  data into local state with sub-millisecond reactivity. Developers can run
  Electric self-hosted as a Docker service or use Electric Cloud, a managed
  offering with pay-as-you-go and subscription plans. The platform also
  underpins PGlite (an embeddable Postgres under 3 MB) and Durable Streams for
  reliable agent messaging, making it a broader data-infrastructure toolkit for
  building collaborative and multi-agent systems.
